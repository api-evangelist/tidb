        projectId: tools.projectId
        clusterStates: tools.clusterStates
      outputParameters:
      - type: object
        mapping: $.
    - name: create-cluster
      description: Create a cluster
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: cloud-clusters.createcluster
      with:
        validateOnly: tools.validateOnly
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-cluster
      description: Get a cluster
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cloud-clusters.getcluster
      outputParameters:
      - type: object
        mapping: $.
    - name: update-cluster
      description: Update a cluster
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: cloud-clusters.updatecluster
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-cluster
      description: Delete a cluster
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: cloud-clusters.deletecluster
      outputParameters:
      - type: object
        mapping: $.
    - name: pause-cluster
      description: Pause a cluster
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: cloud-clusters.pausecluster
      outputParameters:
      - type: object
        mapping: $.
    - name: reset-root-password
      description: Reset root password
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: cloud-clusters.resetclusterrootpassword
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: resume-cluster
      description: Resume a cluster
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: cloud-clusters.resumecluster
      outputParameters:
      - type: object
        mapping: $.
