naftiko: "1.0.0-alpha1"

info:
  label: TiDB Cloud API
  description: >-
    TiDB Cloud REST API for managing administrative objects including projects,
    clusters, backups, restores, data imports, billing, and private endpoint
    connections across TiDB Cloud Serverless and Dedicated tiers.
  tags:
    - TiDB
    - Cloud
    - Database
    - Cluster Management
    - Distributed SQL
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TIDB_CLOUD_PUBLIC_KEY: TIDB_CLOUD_PUBLIC_KEY
      TIDB_CLOUD_PRIVATE_KEY: TIDB_CLOUD_PRIVATE_KEY

capability:
  consumes:
    - type: http
      namespace: tidb-cloud
      baseUri: https://api.tidbcloud.com
      description: TiDB Cloud management REST API with digest authentication
      authentication:
        type: basic
        username: "{{TIDB_CLOUD_PUBLIC_KEY}}"
        password: "{{TIDB_CLOUD_PRIVATE_KEY}}"
      resources:
        - name: clusters
          path: /api/v1beta/clusters
          description: TiDB cluster management
          operations:
            - name: list-clusters
              method: GET
              description: List all TiDB Cloud clusters
              inputParameters:
                - name: projectId
                  in: query
                  type: string
                  required: false
                - name: page
                  in: query
                  type: integer
                  required: false
                - name: page_size
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-cluster
              method: POST
              description: Create a new TiDB Cloud cluster
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  cluster_type: "{{tools.cluster_type}}"
                  cloud_provider: "{{tools.cloud_provider}}"
                  region: "{{tools.region}}"
                  config: "{{tools.config}}"

            - name: get-cluster
              method: GET
              description: Get details for a specific cluster
              inputParameters:
                - name: clusterId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: delete-cluster
              method: DELETE
              description: Delete a TiDB Cloud cluster
              inputParameters:
                - name: clusterId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: backups
          path: /api/v1beta/clusters/{clusterId}/backups
          description: Cluster backup management
          operations:
            - name: list-backups
              method: GET
              description: List backups for a cluster
              inputParameters:
                - name: clusterId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-backup
              method: POST
              description: Create a manual backup for a cluster
              inputParameters:
                - name: clusterId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"

        - name: imports
          path: /api/v1beta/clusters/{clusterId}/imports
          description: Data import tasks
          operations:
            - name: list-imports
              method: GET
              description: List import tasks for a cluster
              inputParameters:
                - name: clusterId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: tidb-cloud-rest
      resources:
        - path: /v1/clusters
          name: clusters
          description: TiDB Cloud clusters
          operations:
            - method: GET
              name: list-clusters
              description: List all TiDB Cloud clusters
              call: "tidb-cloud.list-clusters"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: tidb-cloud-mcp
      transport: http
      tools:
        - name: list-clusters
          description: List all TiDB Cloud clusters
          hints:
            readOnly: true
            openWorld: false
          call: "tidb-cloud.list-clusters"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-cluster
          description: Get details for a specific TiDB Cloud cluster
          hints:
            readOnly: true
            openWorld: false
          call: "tidb-cloud.get-cluster"
          with:
            clusterId: "tools.clusterId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-backups
          description: List backups for a TiDB Cloud cluster
          hints:
            readOnly: true
            openWorld: false
          call: "tidb-cloud.list-backups"
          with:
            clusterId: "tools.clusterId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-imports
          description: List data import tasks for a TiDB Cloud cluster
          hints:
            readOnly: true
            openWorld: false
          call: "tidb-cloud.list-imports"
          with:
            clusterId: "tools.clusterId"
          outputParameters:
            - type: object
              mapping: "$."
