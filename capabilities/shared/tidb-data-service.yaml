naftiko: "1.0.0-alpha1"

info:
  label: TiDB Cloud Data Service API
  description: >-
    TiDB Cloud Data Service enables developers to access TiDB Cloud data via
    HTTPS requests using custom API endpoints backed by SQL queries. Supports
    dynamic SQL execution via Chat2Query AI.
  tags:
    - TiDB
    - Cloud
    - Data Access
    - REST
    - Serverless
    - SQL
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TIDB_DATA_APP_API_KEY: TIDB_DATA_APP_API_KEY

capability:
  consumes:
    - type: http
      namespace: tidb-data-service
      baseUri: https://data.tidbcloud.com
      description: TiDB Cloud Data Service for custom SQL-backed API endpoints
      authentication:
        type: bearer
        token: "{{TIDB_DATA_APP_API_KEY}}"
      resources:
        - name: endpoints
          path: /api/v1beta/app/{dataAppId}/endpoint/{endpointPath}
          description: Custom Data App endpoints
          operations:
            - name: call-endpoint
              method: GET
              description: Call a custom Data App GET endpoint
              inputParameters:
                - name: dataAppId
                  in: path
                  type: string
                  required: true
                - name: endpointPath
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: chat2data
          path: /api/v1beta/app/{dataAppId}/endpoint/chat2data
          description: AI-powered natural language to SQL
          operations:
            - name: chat2query
              method: POST
              description: Generate and execute SQL from natural language instruction
              inputParameters:
                - name: dataAppId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  cluster_id: "{{tools.cluster_id}}"
                  database: "{{tools.database}}"
                  instruction: "{{tools.instruction}}"

  exposes:
    - type: rest
      port: 8101
      namespace: tidb-data-service-rest
      resources:
        - path: /v1/query
          name: chat2query
          description: Natural language SQL queries
          operations:
            - method: POST
              name: chat2query
              description: Execute a natural language query against a TiDB database
              call: "tidb-data-service.chat2query"
              with:
                cluster_id: "rest.cluster_id"
                database: "rest.database"
                instruction: "rest.instruction"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: tidb-data-service-mcp
      transport: http
      tools:
        - name: chat2query
          description: Execute a natural language instruction against a TiDB database using AI-generated SQL
          hints:
            readOnly: true
            openWorld: false
          call: "tidb-data-service.chat2query"
          with:
            cluster_id: "tools.cluster_id"
            database: "tools.database"
            instruction: "tools.instruction"
          outputParameters:
            - type: object
              mapping: "$."
