specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: tidb
providerId: tidb
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Database
  - Cloud
  - HTAP
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps for TiDB Cloud: Request-Unit and storage metering on Starter/Essential/Premium,
  hourly instance billing on Dedicated, and contract-based licensing on Self-Managed.'
sources:
  - https://www.pingcap.com/pricing/
  - https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: PingCAP, Inc.
serviceCategory: Database
billingModel:
  pricingCategory: Pay-As-You-Go + Subscription
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Adjustment
    - Credit
focusColumns:
  ServiceName: TiDB Cloud
  ServiceCategory: Database
  ProviderName: PingCAP
  PublisherName: PingCAP, Inc.
  InvoiceIssuerName: PingCAP, Inc.
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: request_units
    unit: request-unit
    aggregation: sum
    dimensions:
      - cluster
      - region
      - tier
  - name: row_storage
    unit: GB-month
    aggregation: max
    dimensions:
      - cluster
      - region
  - name: column_storage
    unit: GB-month
    aggregation: max
    dimensions:
      - cluster
      - region
  - name: dedicated_node_hours
    unit: instance-hour
    aggregation: sum
    dimensions:
      - cluster
      - node_type
      - cloud_provider
      - region
  - name: data_transfer
    unit: GB
    aggregation: sum
    dimensions:
      - cluster
      - region
principles:
  - name: Visibility
    description: Use the TiDB Cloud console billing dashboard and exported invoices to see RU consumption,
      storage growth, and Dedicated node-hours per cluster.
  - name: Allocation
    description: Allocate cost by cluster name and project tags; tag clusters with the owning team and
      environment so RU and storage spend roll up cleanly.
  - name: Optimization
    description: For Starter, tune queries to reduce RU consumption and use spend limits; for Dedicated,
      right-size vCPU node counts (4–32 vCPU options) and consolidate underutilized clusters.
  - name: Accountability
    description: Assign a database platform owner accountable for the PingCAP account, free-tier headroom,
      and quarterly true-up against RU and node-hour burn.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
